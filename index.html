<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Rush - VedGames Production</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin:10px;
    font-size:40px;
}

#score{
    font-size:25px;
    margin-bottom:10px;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

.ball{
    position:absolute;
    width:60px;
    height:60px;
    border-radius:50%;
    cursor:pointer;
    animation:pop 0.2s ease;
}

@keyframes pop{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

#startBtn{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:lime;
    color:black;
    font-weight:bold;
}

#gameOver{
    display:none;
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#222;
    padding:30px;
    border-radius:20px;
}

#highscore{
    font-size:20px;
}
</style>
</head>

<body>

<h1>⚡ Color Rush</h1>
<div id="score">Score: 0</div>

<button id="startBtn">START GAME</button>

<div id="game"></div>

<div id="gameOver">
    <h2>Game Over</h2>
    <p id="finalScore"></p>
    <p id="highscore"></p>
    <button onclick="restartGame()">Play Again</button>
</div>

<script>
const game = document.getElementById("game");
const scoreText = document.getElementById("score");
const startBtn = document.getElementById("startBtn");
const gameOverBox = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");
const highscoreText = document.getElementById("highscore");

let score = 0;
let speed = 1500;
let gameRunning = false;
let highscore = localStorage.getItem("colorRushHigh") || 0;

startBtn.onclick = startGame;

function startGame(){
    score = 0;
    speed = 1500;
    gameRunning = true;

    scoreText.innerHTML = "Score: 0";
    startBtn.style.display = "none";
    gameOverBox.style.display = "none";

    spawnBall();
}

function spawnBall(){

    if(!gameRunning) return;

    const ball = document.createElement("div");
    ball.classList.add("ball");

    const colors = ["red","blue","lime","yellow","cyan","orange","pink"];
    ball.style.background = colors[Math.floor(Math.random()*colors.length)];

    const x = Math.random() * (window.innerWidth - 70);
    const y = Math.random() * (window.innerHeight - 150);

    ball.style.left = x + "px";
    ball.style.top = y + "px";

    game.appendChild(ball);

    let clicked = false;

    ball.onclick = () => {
        clicked = true;
        score++;
        scoreText.innerHTML = "Score: " + score;

        if(score % 5 === 0 && speed > 500){
            speed -= 100;
        }

        ball.remove();
        spawnBall();
    };

    setTimeout(() => {
        if(!clicked){
            endGame();
        }
        ball.remove();
    }, speed);
}

function endGame(){
    gameRunning = false;

    if(score > highscore){
        highscore = score;
        localStorage.setItem("colorRushHigh", highscore);
    }

    finalScore.innerHTML = "Your Score: " + score;
    highscoreText.innerHTML = "High Score: " + highscore;

    gameOverBox.style.display = "block";
}

function restartGame(){
    startGame();
}
</script>

</body>
</html>
