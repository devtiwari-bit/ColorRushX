<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:#070b1a;
    color:white;
}

/* Animated Background */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.bg span{
    position:absolute;
    width:4px;
    height:4px;
    background:cyan;
    border-radius:50%;
    animation:move 10s linear infinite;
    opacity:0.6;
}

@keyframes move{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100vh);
    }
}

/* SMOOTH SHAKE */

@keyframes shake{
    0%{transform:translateX(0);}
    20%{transform:translateX(-4px);}
    40%{transform:translateX(4px);}
    60%{transform:translateX(-3px);}
    80%{transform:translateX(3px);}
    100%{transform:translateX(0);}
}

.shake{
    animation:shake 0.22s ease-in-out;
}

/* Top UI */

#topbar{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:700px;

    display:flex;
    justify-content:space-between;

    padding:15px 25px;

    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(10px);

    border-radius:20px;

    box-shadow:0 0 20px rgba(0,255,255,0.2);

    z-index:100;
}

.box{
    text-align:center;
}

.label{
    font-size:13px;
    opacity:0.7;
}

.value{
    font-size:25px;
    font-weight:bold;
}

/* Start Screen */

#menu,
#gameover{

    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    text-align:center;

    background:rgba(255,255,255,0.08);

    padding:40px;

    border-radius:25px;

    backdrop-filter:blur(12px);

    box-shadow:0 0 40px rgba(0,255,255,0.25);
}

#gameover{
    display:none;
}

h1{
    font-size:60px;
    margin-bottom:10px;

    background:linear-gradient(90deg,cyan,#00ff88);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    opacity:0.8;
    margin-bottom:25px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:15px;

    font-size:20px;
    font-weight:bold;

    background:linear-gradient(90deg,cyan,#00ff88);

    cursor:pointer;

    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

/* Difficulty */

#difficulty{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    margin-bottom:20px;
    font-size:18px;
    background:#111827;
    color:white;
    outline:none;
}

/* Game Ball */

.ball{

    position:absolute;

    border-radius:50%;

    cursor:pointer;

    animation:pop 0.12s ease;

    transition:transform 0.08s linear;

}

.ball:hover{
    transform:scale(1.08);
}

@keyframes pop{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}

/* Combo */

.combo{
    position:absolute;
    font-size:25px;
    font-weight:bold;
    pointer-events:none;
    animation:combo 0.7s forwards;
}

@keyframes combo{
    from{
        opacity:1;
        transform:translateY(0);
    }
    to{
        opacity:0;
        transform:translateY(-50px);
    }
}

/* WATERMARK */

#watermark{
    position:fixed;
    right:12px;
    bottom:10px;

    font-size:18px;
    font-weight:bold;

    color:#ffffff;

    text-shadow:
    0 0 5px rgba(255,255,255,0.9),
    0 0 10px rgba(0,255,255,0.7),
    0 0 20px rgba(0,255,255,0.5);

    letter-spacing:1px;

    opacity:0.95;
}

<body>

<div class="bg" id="bg"></div>

<div id="topbar">

    <div class="box">
        <div class="label">SCORE</div>
        <div class="value" id="score">0</div>
    </div>

    <div class="box">
        <div class="label">RANK</div>
        <div class="value" id="rank">Beginner</div>
    </div>

    <div class="box">
        <div class="label">BEST</div>
        <div class="value" id="best">0</div>
    </div>

</div>

<div id="menu">

    <h1>COLOR RUSH X</h1>

    <p>Fast reflexes only ⚡</p>

    <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="normal">Normal</option>
        <option value="hard">Hard</option>
    </select>

    <br>

    <button onclick="startGame()">START</button>

</div>

<div id="gameover">

    <h1>GAME OVER</h1>

    <p id="final"></p>

    <button onclick="startGame()">PLAY AGAIN</button>

</div>

<div id="watermark">@Ved Games Production</div>

<!-- AUDIO -->

<audio id="bgmusic" loop>
<source src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3" type="audio/mpeg">
</audio>

<audio id="clicksound">
<source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
</audio>

<audio id="misssound">
<source src="https://assets.mixkit.co/active_storage/sfx/209/209-preview.mp3" type="audio/mpeg">
</audio>

<script>

/* Background Particles */

const bg = document.getElementById("bg");

for(let i=0;i<50;i++){

    const star = document.createElement("span");

    star.style.left = Math.random()*100 + "vw";

    star.style.animationDuration = 5 + Math.random()*10 + "s";

    star.style.opacity = Math.random();

    bg.appendChild(star);
}

/* Game Variables */

const scoreText = document.getElementById("score");
const rankText = document.getElementById("rank");
const bestText = document.getElementById("best");

const menu = document.getElementById("menu");
const gameover = document.getElementById("gameover");
const final = document.getElementById("final");

const bgmusic = document.getElementById("bgmusic");
const clicksound = document.getElementById("clicksound");
const misssound = document.getElementById("misssound");
const difficulty = document.getElementById("difficulty");

let score = 0;
let speed = 1400;
let activeBall = null;
let timer = null;

let best = localStorage.getItem("rushxbest") || 0;

bestText.innerHTML = best;

/* SAVED DIFFICULTY */

let savedDifficulty = localStorage.getItem("rushxdifficulty") || "normal";

difficulty.value = savedDifficulty;

function getRank(score){

    if(score < 10) return "Beginner";
    if(score < 20) return "Gamer";
    if(score < 35) return "Pro";
    if(score < 50) return "Legend";
    if(score < 80) return "Master";

    return "Speed God";
}

function startGame(){

    score = 0;

    const mode = difficulty.value;

    localStorage.setItem("rushxdifficulty", mode);

    if(mode === "easy"){
        speed = 1800;
    }
    else if(mode === "hard"){
        speed = 900;
    }
    else{
        speed = 1400;
    }

    scoreText.innerHTML = score;

    rankText.innerHTML = "Beginner";

    menu.style.display = "none";

    gameover.style.display = "none";

    bgmusic.volume = 0.25;

    bgmusic.play();

    clearBall();

    spawnBall();
}

function clearBall(){

    if(activeBall){
        activeBall.remove();
        activeBall = null;
    }

    clearTimeout(timer);
}

function spawnBall(){

    clearBall();

    const ball = document.createElement("div");

    ball.className = "ball";

    const colors = [
        "#00f7ff",
        "#00ff88",
        "#ff00ff",
        "#ffea00",
        "#ff5555",
        "#9d4dff"
    ];

    const color = colors[Math.floor(Math.random()*colors.length)];

    const size = 65;

    ball.style.width = size + "px";
    ball.style.height = size + "px";

    ball.style.background = color;

    ball.style.boxShadow = `0 0 35px ${color}`;

    /* SAFE AREA */

    const topSafeArea = 120;

    const maxX = window.innerWidth - size;
    const maxY = window.innerHeight - size - topSafeArea;

    const x = Math.random() * maxX;
    const y = topSafeArea + (Math.random() * maxY);

    ball.style.left = x + "px";
    ball.style.top = y + "px";

    document.body.appendChild(ball);

    activeBall = ball;

    ball.onclick = () => {

        clicksound.currentTime = 0;
        clicksound.play();

        score++;

        scoreText.innerHTML = score;

        rankText.innerHTML = getRank(score);

        showCombo(x,y);

        if(score % 5 === 0 && speed > 500){
            speed -= 80;
        }

        spawnBall();
    };

    timer = setTimeout(()=>{

        endGame();

    },speed);
}

function showCombo(x,y){

    const combo = document.createElement("div");

    combo.className = "combo";

    combo.innerHTML = "+1";

    combo.style.left = x + "px";

    combo.style.top = y + "px";

    combo.style.color = "white";

    document.body.appendChild(combo);

    setTimeout(()=>{
        combo.remove();
    },700);
}

function endGame(){

    clearBall();

    misssound.currentTime = 0;
    misssound.play();

    bgmusic.pause();

    document.documentElement.classList.add("shake");

    setTimeout(()=>{
        document.documentElement.classList.remove("shake");
    },220);

    if(score > best){

        best = score;

        localStorage.setItem("rushxbest",best);

        bestText.innerHTML = best;
    }

    final.innerHTML =
    "Score: " + score +
    "<br><br>Rank: " + getRank(score);

    gameover.style.display = "block";
}

</script>

</body>
