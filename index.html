<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Color Rush X - VedGames Production</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(135deg,#050816,#0d132d,#090b15);
    color:white;
}

/* Animated Background */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle,rgba(0,255,255,0.15) 10%,transparent 10%),
    radial-gradient(circle,rgba(255,0,255,0.1) 10%,transparent 10%);
    background-size:120px 120px;
    animation:bgMove 12s linear infinite;
    z-index:-1;
}

@keyframes bgMove{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(-120px,-120px);
    }
}

#topUI{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
    background:rgba(255,255,255,0.08);
    padding:15px 25px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(0,255,255,0.2);
    z-index:100;
}

.uiBox{
    text-align:center;
}

.uiTitle{
    font-size:14px;
    opacity:0.7;
}

.uiValue{
    font-size:24px;
    font-weight:bold;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

.ball{
    position:absolute;
    width:75px;
    height:75px;
    border-radius:50%;
    cursor:pointer;
    animation:spawn 0.2s ease;
    box-shadow:0 0 30px currentColor;
}

@keyframes spawn{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}

.ball:hover{
    transform:scale(1.1);
}

#startScreen,
#gameOver{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 40px rgba(0,255,255,0.25);
}

h1{
    font-size:60px;
    margin-bottom:10px;
    background:linear-gradient(90deg,cyan,pink);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    opacity:0.8;
    margin-bottom:20px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,cyan,#00ff88);
    color:black;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.08);
}

#gameOver{
    display:none;
}

#watermark{
    position:fixed;
    bottom:10px;
    right:15px;
    color:white;
    opacity:0.8;
    font-size:18px;
    font-weight:bold;
}

.rank{
    font-size:28px;
    margin:15px 0;
    color:#00ffe0;
}

.comboEffect{
    position:absolute;
    font-size:30px;
    font-weight:bold;
    color:white;
    animation:fadeUp 1s forwards;
    pointer-events:none;
}

@keyframes fadeUp{
    from{
        opacity:1;
        transform:translateY(0);
    }
    to{
        opacity:0;
        transform:translateY(-60px);
    }
}
</style>
</head>

<body>

<div id="topUI">
    <div class="uiBox">
        <div class="uiTitle">SCORE</div>
        <div class="uiValue" id="score">0</div>
    </div>

    <div class="uiBox">
        <div class="uiTitle">RANK</div>
        <div class="uiValue" id="rank">Beginner</div>
    </div>

    <div class="uiBox">
        <div class="uiTitle">BEST</div>
        <div class="uiValue" id="best">0</div>
    </div>
</div>

<div id="game">

<div id="startScreen">
    <h1>COLOR RUSH X</h1>
    <p>Test your speed and reflexes ⚡</p>
    <button onclick="startGame()">START GAME</button>
</div>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <div class="rank" id="finalRank"></div>
    <p id="finalScore"></p>
    <button onclick="restartGame()">PLAY AGAIN</button>
</div>

</div>

<div id="watermark">@Ved Games Production</div>

<script>
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const rankEl = document.getElementById("rank");
const bestEl = document.getElementById("best");

const startScreen = document.getElementById("startScreen");
const gameOver = document.getElementById("gameOver");

const finalScore = document.getElementById("finalScore");
const finalRank = document.getElementById("finalRank");

let score = 0;
let speed = 1600;
let playing = false;

let best = localStorage.getItem("rushBest") || 0;
bestEl.innerHTML = best;

function getRank(score){
    if(score < 5) return "Beginner";
    if(score < 15) return "Gamer";
    if(score < 30) return "Pro Gamer";
    if(score < 50) return "Legend";
    if(score < 80) return "Master";
    return "Speed God";
}

function startGame(){
    score = 0;
    speed = 1600;
    playing = true;

    scoreEl.innerHTML = score;
    rankEl.innerHTML = "Beginner";

    startScreen.style.display = "none";
    gameOver.style.display = "none";

    spawnBall();
}

function spawnBall(){

    if(!playing) return;

    const ball = document.createElement("div");
    ball.classList.add("ball");

    const colors = [
        "#00f7ff",
        "#ff00ff",
        "#00ff88",
        "#ffea00",
        "#ff4444",
        "#9d4dff"
    ];

    const color = colors[Math.floor(Math.random()*colors.length)];

    ball.style.background = color;
    ball.style.color = color;

    const size = 60 + Math.random()*25;

    ball.style.width = size + "px";
    ball.style.height = size + "px";

    const x = Math.random() * (window.innerWidth - size);
    const y = Math.random() * (window.innerHeight - size);

    ball.style.left = x + "px";
    ball.style.top = y + "px";

    game.appendChild(ball);

    let clicked = false;

    ball.onclick = () => {

        clicked = true;

        score++;
        scoreEl.innerHTML = score;

        const rank = getRank(score);
        rankEl.innerHTML = rank;

        createCombo("+1", x, y);

        if(score % 4 === 0 && speed > 450){
            speed -= 70;
        }

        ball.remove();

        spawnBall();
    };

    setTimeout(() => {

        if(!clicked){
            endGame();
        }

        ball.remove();

    }, speed);
}

function createCombo(text,x,y){

    const combo = document.createElement("div");

    combo.classList.add("comboEffect");

    combo.innerHTML = text;

    combo.style.left = x + "px";
    combo.style.top = y + "px";

    game.appendChild(combo);

    setTimeout(()=>{
        combo.remove();
    },1000);
}

function endGame(){

    playing = false;

    if(score > best){
        best = score;
        localStorage.setItem("rushBest",best);
        bestEl.innerHTML = best;
    }

    finalScore.innerHTML = "Score: " + score;
    finalRank.innerHTML = getRank(score);

    gameOver.style.display = "block";
}

function restartGame(){
    startGame();
}
</script>

</body>
</html>
